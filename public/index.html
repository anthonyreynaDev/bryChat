<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Mi Chatbot</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#202123;
}

#chat{
  height:90vh;
  overflow-y:auto;
  padding:20px;
}

.message{
  max-width:70%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

.user{
  background:#0b93f6;
  color:white;
  margin-left:auto;
}

.bot{
  background:#444654;
  color:white;
}

#inputArea{
  display:flex;
  height:10vh;
}

#msg{
  flex:1;
  font-size:18px;
}

button{
  width:120px;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" type="text">
  <button onclick="enviar()">Enviar</button>
</div>

<script>
    document
.getElementById("msg")
.addEventListener(
  "keypress",
  function(event){

    if(event.key==="Enter"){
      enviar();
    }

});

const chat =
document.getElementById("chat");

function agregarMensaje(texto,tipo){

  const div =
    document.createElement("div");

  div.className =
    `message ${tipo}`;

  div.innerText = texto;

  chat.appendChild(div);

  chat.scrollTop =
    chat.scrollHeight;
}

async function enviar(){

  const input =
    document.getElementById("msg");

  const mensaje =
    input.value.trim();

  if(!mensaje) return;

  agregarMensaje(
    mensaje,
    "user"
  );

  input.value = "";

  const res =
    await fetch("/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:mensaje
      })
    });

  const data =
    await res.json();

  agregarMensaje(
    data.response,
    "bot"
  );
}

</script>

</body>
</html>
